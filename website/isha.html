<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isha Upanishad | KasturiChain Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-glow orb-1"></div>
    <div class="bg-glow orb-2"></div>

    <nav class="navbar">
        <div class="logo">
            <span class="om">ॐ</span> KasturiChain
        </div>
        <ul class="nav-links">
            <li><a href="library.html"><i class="fas fa-arrow-left"></i> Back to Library</a></li>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <section class="section">
        <div class="container">
            <div class="section-tag text-center">SANATANA DHARMA BOOKS</div>
            <h1 class="text-center massive-text" style="margin-bottom: 1rem;"><span class="text-gradient">Isha Upanishad</span></h1>
            <p class="center-para" style="margin-bottom: 3rem;">One of the principal Upanishads focusing on the pervasive nature of the Supreme Lord.</p>
            
            <div class="gita-reader dark-glass">
                <div class="reader-controls" style="display: flex; gap: 1rem; align-items: center; justify-content: center;">
                    <button onclick="prevVerse()" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                    <div class="control-group">
                        <label for="verse-select">Verse</label>
                        <select id="verse-select" class="glass-select"></select>
                    </div>
                    <button onclick="nextVerse()" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                
                <div class="reader-display">
                    <div class="sloka-text" id="reader-sanskrit">Loading...</div>
                    <div class="translation" id="reader-translation"></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <span class="om">ॐ</span> KasturiChain
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2026 Kasturi Foundation. Sovereign Open Source.</p>
        </div>
    </footer>

    
    
    <!-- Reader Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const response = await fetch("https://kasturisundari.xyz/rpc/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        jsonrpc: "2.0",
                        method: "shastra_jnan",
                        params: ["isha"],
                        id: 1
                    })
                });
                const rpcData = await response.json();
                if (rpcData.error) throw new Error(rpcData.error.message);
                
                const ishaData = rpcData.result.data;
                const hashStamp = rpcData.result.hash_stamp;
                
                // Add immutable hash display
                const header = document.querySelector('.section-tag');
                if(header) {
                    const hashBadge = document.createElement('div');
                    hashBadge.style.cssText = 'font-size: 0.65rem; color: var(--accent-gold); margin-top: 10px; font-family: monospace; word-break: break-all; opacity: 0.8; margin-bottom: 20px;';
                    hashBadge.innerHTML = `<i class="fas fa-link"></i> SHA-256: ${hashStamp}`;
                    header.parentNode.insertBefore(hashBadge, header.nextSibling);
                }

                if(typeof ishaData !== 'undefined') {
                const verseSelect = document.getElementById('verse-select');
                
                // Populate verses
                verseSelect.innerHTML = '';
                ishaData.forEach((verseObj) => {
                    const option = document.createElement('option');
                    option.value = verseObj.verse;
                    option.textContent = `Verse ${verseObj.verse}`;
                    verseSelect.appendChild(option);
                });

                // Handle verse change
                verseSelect.addEventListener('change', (e) => {
                    const verseNum = e.target.value;
                    displayVerse(verseNum);
                });

                function displayVerse(verseNum) {
                    const verseObj = ishaData.find(v => v.verse == verseNum);
                    if (!verseObj) return;

                    const displayArea = document.querySelector('.reader-display');
                    displayArea.style.opacity = 0;
                    
                    setTimeout(() => {
                        document.getElementById('reader-sanskrit').innerHTML = verseObj.sanskrit.replace(/\n/g, '<br>');
                        document.getElementById('reader-translation').textContent = verseObj.meaning || "Translation not available.";
                        
                        displayArea.style.opacity = 1;
                        displayArea.style.transition = 'opacity 0.4s ease';
                    }, 200);
                }

                // Initial load
                if(ishaData.length > 0) {
                    displayVerse(ishaData[0].verse);
                }
                
                window.prevVerse = function() {
                    if (verseSelect.selectedIndex > 0) {
                        verseSelect.selectedIndex--;
                        displayVerse(verseSelect.value);
                    }
                };

                window.nextVerse = function() {
                    if (verseSelect.selectedIndex < verseSelect.options.length - 1) {
                        verseSelect.selectedIndex++;
                        displayVerse(verseSelect.value);
                    }
                };
            } else {
                document.getElementById('reader-sanskrit').textContent = "Failed to load data.";
            }
            } catch (error) {
                document.getElementById('reader-sanskrit').textContent = "Gateway Error: " + error.message;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
