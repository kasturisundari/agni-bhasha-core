    <section class="section">
        <div class="container">
            <div class="section-tag text-center">SANATANA DHARMA BOOKS</div>
            <h1 class="text-center massive-text" style="margin-bottom: 1rem;">The <span class="text-gradient">Bhagavad Gita</span></h1>
            <p class="center-para" style="margin-bottom: 3rem;">18 Chapters, 700 Slokas. The supreme philosophical discourse spoken by Lord Krishna.</p>
            
            <div class="gita-reader dark-glass">
                <div class="reader-controls" style="display: flex; gap: 1rem; align-items: center; justify-content: center;">
                    <button onclick="prevVerse()" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                    <div class="control-group">
                        <label for="chapter-select">Chapter</label>
                        <select id="chapter-select" class="glass-select"></select>
                    </div>
                    <div class="control-group">
                        <label for="verse-select">Verse</label>
                        <select id="verse-select" class="glass-select"></select>
                    </div>
                    <button onclick="nextVerse()" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                
                <div class="reader-display">
                    <div class="sloka-text" id="gita-sanskrit">Loading...</div>
                    <div class="transliteration" id="gita-translit"></div>
                    <div class="translation" id="gita-translation"></div>
                </div>
            </div>

    <!-- Reader Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const response = await fetch("https://kasturisundari.xyz/samparka", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        jsonrpc: "2.0",
                        method: "shastra_jnan",
                        params: ["gita"],
                        id: 1
                    })
                });
                const rpcData = await response.json();
                if (rpcData.error) throw new Error(rpcData.error.message);
                
                const gitaData = rpcData.result.data;
                const hashStamp = rpcData.result.hash_stamp;
                
                // Add immutable hash display
                const header = document.querySelector('.section-tag');
                if(header) {
                    const hashBadge = document.createElement('div');
                    hashBadge.style.cssText = 'font-size: 0.65rem; color: var(--accent-gold); margin-top: 10px; font-family: monospace; word-break: break-all; opacity: 0.8; margin-bottom: 20px;';
                    hashBadge.innerHTML = `<i class="fas fa-link"></i> SHA-256: ${hashStamp}`;
                    header.parentNode.insertBefore(hashBadge, header.nextSibling);
                }

                if(typeof gitaData !== 'undefined') {
                const chapterSelect = document.getElementById('chapter-select');
                const verseSelect = document.getElementById('verse-select');
                
                // We know gitaData is an array of all verses sequentially.
                // But it does not have an explicit `verses` array per chapter like I initially thought!
                // Wait! Let me group them by chapter first!
                
                const chapters = {};
                gitaData.forEach(verseObj => {
                    const ch = verseObj.chapter_number;
                    if (!chapters[ch]) {
                        chapters[ch] = [];
                    }
                    chapters[ch].push(verseObj);
                });

                // Populate chapters
                chapterSelect.innerHTML = '';
                Object.keys(chapters).forEach(chNum => {
                    const option = document.createElement('option');
                    option.value = chNum;
                    option.textContent = `Chapter ${chNum}`;
                    chapterSelect.appendChild(option);
                });

                // Handle chapter change
                chapterSelect.addEventListener('change', (e) => {
                    const chapterNum = e.target.value;
                    populateVerses(chapterNum);
                });

                // Handle verse change
                verseSelect.addEventListener('change', (e) => {
                    const chapterNum = chapterSelect.value;
                    const verseNum = e.target.value;
                    displayVerse(chapterNum, verseNum);
                });

                function populateVerses(chapterNum) {
                    const verses = chapters[chapterNum];
                    verseSelect.innerHTML = '';
                    verses.forEach((verseObj) => {
                        const option = document.createElement('option');
                        option.value = verseObj.verse_number;
                        option.textContent = `Verse ${verseObj.verse_number}`;
                        verseSelect.appendChild(option);
                    });

                    // Display first verse of the selected chapter
                    if(verses.length > 0) {
                        displayVerse(chapterNum, verses[0].verse_number);
                    }
                }

                function displayVerse(chapterNum, verseNum) {
                    const verseObj = chapters[chapterNum].find(v => v.verse_number == verseNum);
                    if (!verseObj) return;

                    const displayArea = document.querySelector('.reader-display');
                    displayArea.style.opacity = 0;
                    
                    setTimeout(() => {
                        document.getElementById('gita-sanskrit').innerHTML = verseObj.text.replace(/\n/g, '<br>');
                        document.getElementById('gita-translit').innerHTML = verseObj.transliteration.replace(/\n/g, '<br>');
                        
                        // Wait! Sometimes the translation field might be 'meaning' or 'translation'. In gita_data.js it's 'word_meanings' + we might need a general translation if exists.
                        // Let's use word_meanings since that's what we saw in the file.
                        const meaningText = verseObj.translation || verseObj.word_meanings || "Translation not available.";
                        document.getElementById('gita-translation').textContent = meaningText;
                        
                        displayArea.style.opacity = 1;
                        displayArea.style.transition = 'opacity 0.4s ease';
                    }, 200);
                }

                // Initial load
                const firstChapter = Object.keys(chapters)[0];
                if(firstChapter) {
                    populateVerses(firstChapter);
                }
                
                window.prevVerse = function() {
                    if (verseSelect.selectedIndex > 0) {
                        verseSelect.selectedIndex--;
                        displayVerse(chapterSelect.value, verseSelect.value);
                    } else if (chapterSelect.selectedIndex > 0) {
                        chapterSelect.selectedIndex--;
                        populateVerses(chapterSelect.value);
                        verseSelect.selectedIndex = verseSelect.options.length - 1;
                        displayVerse(chapterSelect.value, verseSelect.value);
                    }
                };

                window.nextVerse = function() {
                    if (verseSelect.selectedIndex < verseSelect.options.length - 1) {
                        verseSelect.selectedIndex++;
                        displayVerse(chapterSelect.value, verseSelect.value);
                    } else if (chapterSelect.selectedIndex < chapterSelect.options.length - 1) {
                        chapterSelect.selectedIndex++;
                        populateVerses(chapterSelect.value);
                        verseSelect.selectedIndex = 0;
                        displayVerse(chapterSelect.value, verseSelect.value);
                    }
                };
            } else {
                document.getElementById('gita-sanskrit').textContent = "Failed to load data from node.";
            }
            } catch (error) {
                document.getElementById('gita-sanskrit').textContent = "Gateway Error: " + error.message;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
